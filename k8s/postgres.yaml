apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          env:
            - name: POSTGRES_USER
              value: pulse
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_DB
              value: pulse
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              cpu: "1.0"
              memory: 1Gi
            requests:
              cpu: "200m"
              memory: 256Mi
          healthCheck:
            # PostgreSQL liveness probe
            livenessProbe:
              exec:
                command:
                  - pg_isready
                  - -U
                  - pulse
                  - -d
                  - pulse
              initialDelaySeconds: 15
              timeoutSeconds: 5
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: postgres-pvc
