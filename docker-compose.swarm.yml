# 伯楽 (Hakuraku) Monitoring — Docker Swarm Stack Configuration
# Deploy to Docker Swarm:
# docker stack deploy -c docker-compose.swarm.yml hakuraku

version: "3.8"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=pulse
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=pulse
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - pulse_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.2"
          memory: 256M

  pulse-server:
    image: irvanmalik48/pulse-server:1.0.0
    environment:
      - PULSE_AUTH_SECRET=change-me-to-a-random-64-char-hex-string
      - DATABASE_URL=postgres://pulse:password@postgres:5432/pulse
      - PULSE_GRPC_PORT=50051
      - PULSE_HTTP_PORT=3000
      - RUST_LOG=pulse_server=info
      - PULSE_CORS_ALLOWED_ORIGINS=http://localhost:3000
    networks:
      - pulse_net
    ports:
      - target: 50051
        published: 50051
        protocol: tcp
        mode: ingress
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M

  pulse-agent:
    image: irvanmalik48/pulse-agent:1.0.0
    environment:
      - PULSE_AUTH_SECRET=change-me-to-a-random-64-char-hex-string
      - PULSE_SERVER_ADDR=http://pulse-server:50051
      - PULSE_NODE_ID={{.Node.Hostname}}
      - PULSE_INTERVAL_MS=1000
      - RUST_LOG=pulse_agent=info
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - pulse_net
    deploy:
      mode: global
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

networks:
  pulse_net:
    driver: overlay
    attachable: true

volumes:
  pg_data:
    driver: local
