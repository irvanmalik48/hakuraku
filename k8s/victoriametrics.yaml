apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoriametrics-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
spec:
  ports:
    - port: 8428
      targetPort: 8428
  selector:
    app: victoriametrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.98.0
          ports:
            - containerPort: 8428
          volumeMounts:
            - name: vm-data
              mountPath: /victoria-metrics-data
          resources:
            limits:
              cpu: "1.0"
              memory: 2Gi
            requests:
              cpu: "200m"
              memory: 512Mi
      volumes:
        - name: vm-data
          persistentVolumeClaim:
            claimName: victoriametrics-pvc
