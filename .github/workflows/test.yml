name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Protobuf Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Tests
        env:
          DATABASE_URL: postgres://pulse:password@localhost:5432/pulse
          PULSE_AUTH_SECRET: testsecret-64-character-hex-string-for-integrity-test-321
        run: cargo test --workspace

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: false
          tags: irvanmalik48/pulse-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agent
          push: false
          tags: irvanmalik48/pulse-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build & Upload Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Protobuf Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build Release Binaries
        run: cargo build --release --workspace

      - name: Upload pulse-server Binary
        uses: actions/upload-artifact@v4
        with:
          name: pulse-server-binary
          path: target/release/pulse-server
          if-no-files-found: error

      - name: Upload pulse-agent Binary
        uses: actions/upload-artifact@v4
        with:
          name: pulse-agent-binary
          path: target/release/pulse-agent
          if-no-files-found: error

