apiVersion: v1
kind: Secret
metadata:
  name: pulse-secret
type: Opaque
stringData:
  PULSE_AUTH_SECRET: change-me-to-a-random-64-char-hex-string
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-server
spec:
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: pulse-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulse-server
  template:
    metadata:
      labels:
        app: pulse-server
    spec:
      containers:
        - name: pulse-server
          image: irvanmalik48/pulse-server:1.0.0
          env:
            - name: PULSE_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: pulse-secret
                  key: PULSE_AUTH_SECRET
            - name: DATABASE_URL
              value: postgres://pulse:password@postgres:5432/pulse
            - name: PULSE_GRPC_PORT
              value: "50051"
            - name: PULSE_HTTP_PORT
              value: "3000"
            - name: RUST_LOG
              value: pulse_server=info
            - name: PULSE_CORS_ALLOWED_ORIGINS
              value: "*"
          ports:
            - containerPort: 50051
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: "2.0"
              memory: 2Gi
            requests:
              cpu: "500m"
              memory: 512Mi
